<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Foot's Artwork</title>
    <meta name="description" content="View and manage the items in your shopping cart.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!--
    =======================================
    Navigation Bar
    Three-column layout: Left Logo, Center Nav Links, Right Icons
    Dynamically injected by shared.js
    =======================================
  -->
  <div id="shared-header"></div>

  <!--
    =======================================
    Main Content Area
    =======================================
  -->
  <main class="cart-page">
    <div class="cart-container">
      <!-- 
        =======================================
        Back Link
        Allows user to return to product list and continue shopping
        =======================================
      -->
      <a href="index.html" class="cart-back">
        <!-- Left arrow icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Continue Shopping
      </a>

      <!-- 
        =======================================
        Page Title
        =======================================
      -->
      <h1 class="cart-title">Shopping Cart</h1>

      <!-- 
        =======================================
        Cart Layout
        Two-column layout: left product list + right order summary
        =======================================
      -->
      <div class="cart-layout">
        <!-- 
          =======================================
          Cart Items List
          Dynamically rendered by JavaScript
          =======================================
        -->
        <div id="cart-items" class="cart-items">
          <!-- JavaScript renders cart items here -->
        </div>

        <!-- 
          ======================================================
          Order Summary Card
          Shows subtotal, shipping, total and checkout button
          ======================================================
        -->
        <div class="cart-summary">
          <div class="cart-summary-card">
            <h2 class="cart-summary-title">Order Summary</h2>

            <!-- 
              =======================================
              Price Details
              Contains subtotal, shipping and total
              =======================================
            -->
            <div class="space-y-3 mb-6">
              <!-- Subtotal row -->
              <div class="cart-summary-row">
                <span id="cart-item-count">Subtotal (0 items)</span>
                <span id="cart-subtotal">$0.00</span>
              </div>
              
              <!-- Shipping row -->
              <div class="cart-summary-row">
                <span>Delivery Fees</span>
                <span class="cart-summary-free">Free</span>
              </div>
              
              <!-- Total row -->
              <div class="cart-summary-row total">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
              </div>
            </div>

            <!-- 
              =======================================
              Checkout Button
              Navigates to checkout page
              =======================================
            -->
            <button id="checkout-btn" class="btn btn-primary btn-block" onclick="window.location.href='checkout.html'">
              Proceed to Checkout
            </button>

            <!-- 
              =======================================
              Security Notice
              Shows SSL encryption protection notice
              =======================================
            -->
            <div class="mt-4 flex items-center justify-center gap-2 text-xs text-gray-500">
              <!-- Lock icon -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <span>Secure Checkout · SSL Encrypted</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

    <!--Footer-->
    <footer>

    </footer>

    <!--Search Modal-->
    <div id="search-modal" class="search-modal">
        <div class="search-box">
            <div class="search-input-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" placeholder="Search Products..." aria-label="Search">
                <button class="search-close" onclick="Search.close()">Cancel</button>
            </div>
            <div id="search-results" class="search-results">
                <div class="search-prompt">
                    <p>Enter keywords to search for products</p>
                </div>
            </div>
        </div>
    </div>
</body>
