<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Foot's Artwork</title>
    <meta name="description" content="View and manage the items in your shopping cart.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!--
    =======================================
    Navigation Bar
    Three-column layout: Left Logo, Center Nav Links, Right Icons
    Dynamically injected by shared.js
    =======================================
  -->
  <div id="shared-header"></div>

  <!--
    =======================================
    Main Content Area
    =======================================
  -->
  <main class="cart-page">
    <div class="cart-container">
      <!-- 
        =======================================
        Back Link
        Allows user to return to product list and continue shopping
        =======================================
      -->
      <a href="index.html" class="cart-back">
        <!-- Left arrow icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Continue Shopping
      </a>

      <!-- 
        =======================================
        Page Title
        =======================================
      -->
      <h1 class="cart-title">Shopping Cart</h1>

      <!-- 
        =======================================
        Cart Layout
        Two-column layout: left product list + right order summary
        =======================================
      -->
      <div class="cart-layout">
        <!-- 
          =======================================
          Cart Items List
          Dynamically rendered by JavaScript
          =======================================
        -->
        <div id="cart-items" class="cart-items">
          <!-- JavaScript renders cart items here -->
        </div>

        <!-- 
          ======================================================
          Order Summary Card
          Shows subtotal, shipping, total and checkout button
          ======================================================
        -->
        <div class="cart-summary">
          <div class="cart-summary-card">
            <h2 class="cart-summary-title">Order Summary</h2>

            <!-- 
              =======================================
              Price Details
              Contains subtotal, shipping and total
              =======================================
            -->
            <div class="space-y-3 mb-6">
              <!-- Subtotal row -->
              <div class="cart-summary-row">
                <span id="cart-item-count">Subtotal (0 items)</span>
                <span id="cart-subtotal">$0.00</span>
              </div>
              
              <!-- Shipping row -->
              <div class="cart-summary-row">
                <span>Delivery Fees</span>
                <span class="cart-summary-free">Free</span>
              </div>
              
              <!-- Total row -->
              <div class="cart-summary-row total">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
              </div>
            </div>

            <!-- 
              =======================================
              Checkout Button
              Navigates to checkout page
              =======================================
            -->
            <button id="checkout-btn" class="btn btn-primary btn-block" onclick="window.location.href='checkout.html'">
              Proceed to Checkout
            </button>

            <!-- 
              =======================================
              Security Notice
              Shows SSL encryption protection notice
              =======================================
            -->
            <div class="mt-4 flex items-center justify-center gap-2 text-xs text-gray-500">
              <!-- Lock icon -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <span>Secure Checkout · SSL Encrypted</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

    <!--Footer-->
    <div id="shared-footer"></div>
    <!-- 
    ============================================================
    Script Loading Order:
    1. cart.js      — Cart data management and UI utilities
    2. utils.js     — Site-wide utilities (Toast, theme, search)
    3. shared.js    — Shared components injector
    4. validation.js      — Cart page-specific logic
    ============================================================
  -->

  <!-- Scripts -->
  <script src="js/cart.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/shared.js"></script>

  <!--
    =======================================
    Inline Script
    Cart page-specific logic
    =======================================
  -->
  <script>
    /**
     * ===========================================
     * All Products Data
     * Used for search modal functionality
     * ===========================================
     */
    const allProducts = [
      { id: 1, title: "TURTLE MINI COLOURED", price: 215.0, image: "images/image 17.png" },
      { id: 2, title: "TURTLE MARBLE", price: 585.0, image: "images/image 18.png" },
      { id: 3, title: "TURTLE 14 CARAT", price: 3850.0, image: "images/image 19.png" },
      { id: 4, title: "TURTLE RELIEF", price: 215.0, image: "images/image 20.png" },
      { id: 5, title: "TURTLE ALLOY", price: 585.0, image: "images/image 27.png" },
      { id: 6, title: "TURTLE MINI AQUA", price: 215.0, image: "images/image 28.png" },
      { id: 7, title: "TURTLE COLOURED", price: 415.0, image: "images/image 29.png" },
      { id: 8, title: "TURTLE GOLD BRONZE", price: 445.0, image: "images/image 30.png" },
      { id: 9, title: "TURTLE JADE CAST", price: 415.0, image: "images/image 31.png" }
    ];

    /**
     * ===========================================
     * Page Initialization
     *
     * DOMContentLoaded event fires when DOM is fully loaded
     * 
     * Executes initialization tasks:
     * 1. Render cart UI
     * 2. Subscribe to cart data changes
     * 3. Set checkout button state
     * ===========================================
     */
    document.addEventListener('DOMContentLoaded', () => {
      // 
      // Initial render: cart item list, price subtotal, and quantity badge
      //
      CartUtils.updateCartUI();
      
      /**
       * ===========================================
       * Cart Data Change Subscription
       * 
       * Uses pub-sub pattern: automatically updates UI when cart data changes
       *
       * cart.subscribe() receives a callback function that is called when cart state changes
       * ===========================================
       */
      cart.subscribe(() => {
        // Update cart UI (product list, prices, badge)
        CartUtils.updateCartUI();
        
        /**
         * ===========================================
         * Dynamic Checkout Button State Control
         * 
         * Sets button disabled/enabled state based on cart emptiness
         * Adjusts button style (opacity, cursor) based on cart emptiness
         * ===========================================
         */
        const checkoutBtn = document.getElementById('checkout-btn');
        if (checkoutBtn) {
          const hasItems = cart.getItems().length > 0;
          
          // Set button disabled state
          checkoutBtn.disabled = !hasItems;
          
          // Set opacity effect (semi-transparent when disabled)
          checkoutBtn.style.opacity = hasItems ? '1' : '0.5';
          
          // Set cursor style
          checkoutBtn.style.cursor = hasItems ? 'pointer' : 'not-allowed';
        }
      });
      
      // 
      // Trigger subscription callback once to ensure correct initial button state
      //
      CartUtils.updateCartUI();
    });
  </script>
</body>
</html>
