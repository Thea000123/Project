<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOT - Marine Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        :root {
            --primary-bg: #8c9dc3;
            --filter-active: #8b9be8;
            --cart-btn-color: #89c7d6;
            --text-main: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        .hero {
            position: relative; width: 100%; min-height: 700px; height: auto;
            background: url('images/image 2.jpg') center/cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px 0 50px 0;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }
        .back-btn { position: absolute; top: 30px; left: 50px; color: #fff; font-size: 24px; z-index: 10; }
        .hero h1 {
            position: relative; z-index: 10; color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 54px; font-weight: 500; letter-spacing: 1px;
            text-align: center; margin-top: auto;
        }

        .main-content { background-color: var(--primary-bg); padding-bottom: 50px; }
        
        .filters {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; padding: 30px 0; max-width: 800px; margin: 0 auto;
        }
        .filter-btn {
            padding: 8px 20px; border-radius: 22px; background: #fff; border: none;
            font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600;
            color: #333; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center; text-decoration: none;
        }
        .filter-btn.active { background: var(--filter-active); color: #fff; }

        .grid-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }

        .product-card {
            background: #fff; border-radius: 12px; overflow: hidden; position: relative;
            display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .product-image {
            width: 100%; height: 220px; background: #f9f9f9; padding: 15px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .product-image img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s; }
        .product-card:hover .product-image img { transform: scale(1.05); }

        .cart-btn {
            position: absolute; right: 20px; top: 200px; width: 45px; height: 45px;
            background: var(--cart-btn-color); border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #222; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.2s, transform 0.2s, background 0.15s;
            z-index: 2;
        }
        .product-card:hover .cart-btn { opacity: 1; }
        .cart-btn:hover { background: #5bb8cc; }

        .product-info { padding: 30px 20px 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 18px; font-weight: 600; text-transform: uppercase; line-height: 1.4; margin-bottom: 15px; letter-spacing: 0.5px; }
        .product-price { font-size: 21px; font-weight: 500; color: #444; }
