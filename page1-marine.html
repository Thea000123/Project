<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOT - Marine Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        :root {
            --primary-bg: #8c9dc3;
            --filter-active: #8b9be8;
            --cart-btn-color: #89c7d6;
            --text-main: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        .hero {
            position: relative; width: 100%; min-height: 700px; height: auto;
            background: url('images/image 2.jpg') center/cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px 0 50px 0;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }
        .back-btn { position: absolute; top: 30px; left: 50px; color: #fff; font-size: 24px; z-index: 10; }
        .hero h1 {
            position: relative; z-index: 10; color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 54px; font-weight: 500; letter-spacing: 1px;
            text-align: center; margin-top: auto;
        }

        .main-content { background-color: var(--primary-bg); padding-bottom: 50px; }
        
        .filters {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; padding: 30px 0; max-width: 800px; margin: 0 auto;
        }
        .filter-btn {
            padding: 8px 20px; border-radius: 22px; background: #fff; border: none;
            font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600;
            color: #333; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center; text-decoration: none;
        }
        .filter-btn.active { background: var(--filter-active); color: #fff; }

        .grid-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }

        .product-card {
            background: #fff; border-radius: 12px; overflow: hidden; position: relative;
            display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .product-image {
            width: 100%; height: 220px; background: #f9f9f9; padding: 15px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .product-image img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s; }
        .product-card:hover .product-image img { transform: scale(1.05); }

        .cart-btn {
            position: absolute; right: 20px; top: 200px; width: 45px; height: 45px;
            background: var(--cart-btn-color); border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #222; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.2s, transform 0.2s, background 0.15s;
            z-index: 2;
        }
        .product-card:hover .cart-btn { opacity: 1; }
        .cart-btn:hover { background: #5bb8cc; }

        .product-info { padding: 30px 20px 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 18px; font-weight: 600; text-transform: uppercase; line-height: 1.4; margin-bottom: 15px; letter-spacing: 0.5px; }
        .product-price { font-size: 21px; font-weight: 500; color: #444; }
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 14px; font-weight: 500; padding: 10px 0; }
        .pagination .pg-arrow { cursor: pointer; font-size: 14px; color: #fff; padding: 4px 8px; }
        .page-num { cursor: pointer; color: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
        .page-num:hover { color: #fff; background: rgba(255,255,255,0.2); }
        .page-num.active { color: #fff; font-weight: 700; background: rgba(255,255,255,0.25); }
        .page-num.disabled { opacity: 0.35; pointer-events: none; }
    </style>
</head>
<body>

    <div id="shared-header"></div>

    <div class="hero">
        <a href="main.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>Marine Life</h1>
    </div>

    <div class="main-content">
        <div class="filters">
            <button class="filter-btn active">All</button>
            <a href="page2-turtle.html" class="filter-btn">Turtles</a>
            <button class="filter-btn">Dolphins</button>
            <button class="filter-btn">Reef</button>
            <button class="filter-btn">Whales</button>
            <button class="filter-btn">Fish</button>
            <button class="filter-btn">Seahorse</button>
            <button class="filter-btn">Sealions</button>
        </div>

        <div class="grid-container">
            <div class="product-grid" id="product-grid"></div>
            <div class="pagination">
                <span class="pg-arrow" id="pg-prev"><i class="fas fa-caret-left"></i></span>
                <span class="page-num active" data-page="1">1</span>
                <span class="page-num" data-page="2">2</span>
                <span class="pg-arrow" id="pg-next"><i class="fas fa-caret-right"></i></span>
            </div>
        </div>
    </div>

    <div id="shared-footer"></div>

    <script src="js/cart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/shared.js"></script>
    <script>
        // All products — page 2 repeats page 1 (same products)
        const MARINE_PRODUCTS = [
            // Page 1
            { id: 101, title: 'FISH CORAL TROUT',           price: 825,  image: 'images/image 17.png' },
            { id: 102, title: 'DOLPHIN MOTHER AND CALF MINI', price: 365, image: 'images/image 18.png' },
            { id: 103, title: 'TURTLE GOLD BRONZE',          price: 445,  image: 'images/image 19.png' },
            { id: 104, title: 'WHALE HUMPBACK MINI',         price: 320,  image: 'images/image 20.png' },
            { id: 105, title: 'FISH BARRAMUNDI STUDY',       price: 535,  image: 'images/image 27.png' },
            { id: 106, title: 'TURTLE SLEEPY MARBLE',        price: 2695, image: 'images/image 28.png' },
            { id: 107, title: 'FISH BARRAMUNDI',             price: 725,  image: 'images/image 29.png' },
            { id: 108, title: 'MANTA RAY MINI',              price: 210,  image: 'images/image 30.png' },
            // Page 2 — same products (reuse with different ids)
            { id: 109, title: 'FISH CORAL TROUT',            price: 825,  image: 'images/image 17.png' },
            { id: 110, title: 'DOLPHIN MOTHER AND CALF MINI',price: 365,  image: 'images/image 18.png' },
            { id: 111, title: 'TURTLE GOLD BRONZE',          price: 445,  image: 'images/image 19.png' },
            { id: 112, title: 'WHALE HUMPBACK MINI',         price: 320,  image: 'images/image 20.png' },
            { id: 113, title: 'FISH BARRAMUNDI STUDY',       price: 535,  image: 'images/image 27.png' },
            { id: 114, title: 'TURTLE SLEEPY MARBLE',        price: 2695, image: 'images/image 28.png' },
            { id: 115, title: 'FISH BARRAMUNDI',             price: 725,  image: 'images/image 29.png' },
            { id: 116, title: 'MANTA RAY MINI',              price: 210,  image: 'images/image 30.png' },
        ];

        const PER_PAGE = 8;
        let currentPage = 1;
        const totalPages = Math.ceil(MARINE_PRODUCTS.length / PER_PAGE);

        function formatPrice(p) {
            return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        function renderGrid(page) {
            const grid = document.getElementById('product-grid');
            const start = (page - 1) * PER_PAGE;
            const items = MARINE_PRODUCTS.slice(start, start + PER_PAGE);

            grid.innerHTML = items.map(p => `
                <div class="product-card" data-id="${p.id}" data-title="${p.title}" data-price="${p.price}" data-image="${p.image}">
                    <div class="product-image"><img src="${p.image}" alt="${p.title}" loading="lazy"></div>
                    <button class="cart-btn" aria-label="Add to cart"><i class="fas fa-shopping-cart"></i></button>
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-price">${formatPrice(p.price)}</div>
                    </div>
                </div>
            `).join('');

            // Wire card clicks
            grid.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', e => {
                    if (e.target.closest('.cart-btn')) return;
                    window.location.href = 'product-3.html';
                });
            });

            // Wire cart buttons — use setTimeout to ensure Toast/CartUtils are ready
            grid.querySelectorAll('.cart-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const card = btn.closest('.product-card');
                    const product = {
                        id: parseInt(card.dataset.id),
                        title: card.dataset.title,
                        price: parseFloat(card.dataset.price),
                        image: card.dataset.image
                    };
                    // CartUtils is always available since cart.js loads first
                    CartUtils.addToCart(product);
                    Toast.show(product.title + ' added to cart', 'success', {
                        action: { label: 'View Cart', href: 'cart.html' }
                    });
                });
            });
        }
