<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ================================================
    Document Head Information
    charset: UTF-8
    viewport: responsive layout
    ================================================
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Checkout — Foot's Artworks</title>
  <meta name="description" content="Secure Checkout - Complete Your Order">
  <!--
    ================================================
    External Resources Loading
    1. Google Fonts: Inter (body) + Playfair Display (headings)
    2. Internal stylesheet styles.css
    ================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
   <style>
    /* 
     * ============================================================
     * Checkout Page Specific Styles
     * ============================================================
     */

    /* 
     * ============================================================
     * Navbar Layout
     * Top row: three icons on the right
     * Bottom row: Logo on left + nav links in center
     * ============================================================
     */
    .co-navbar {
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    /* Navbar top area */
    .co-navbar-top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 2rem;
      border-bottom: 1px solid #f3f4f6;
    }
    
    /* Navbar main area */
    .co-navbar-main {
      display: flex;
      align-items: center;
      padding: 0.75rem 2rem;
      gap: 2rem;
    }
    
    /* Logo styles */
    .co-navbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      color: #111;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    
    /* Navigation links styles */
    .co-navbar-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }
    .co-navbar-links a {
      text-decoration: none;
      font-size: 0.875rem;
      color: #374151;
      transition: color 0.15s;
    }
    .co-navbar-links a:hover { color: #0ea5e9; }
    
    /* Icon button styles */
    .co-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.35rem;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.875rem;
      text-decoration: none;
      position: relative;
    }
    .co-icon-btn:hover { color: #0ea5e9; }

    /* 
     * ============================================================
     * Main Layout
     * ============================================================
     */
    .co-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
     /* 
     * ============================================================
     * Express Checkout Section
     * Provides PayPal/Apple Pay/Google Pay express payment options
     * ============================================================
     */
    .co-express {
      text-align: center;
      margin-bottom: 2rem;
    }
    .co-express-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #111;
    }
