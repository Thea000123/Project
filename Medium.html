<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium - FOOT Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        main { padding: 40px 0 80px 0; }
        
        .page-header { display: flex; align-items: center; justify-content: center; position: relative; margin-top: 30px; margin-bottom: 40px; }
        .back-btn { position: absolute; left: 0; font-size: 24px; cursor: pointer; }
        .page-title { font-family: 'Times New Roman', Times, serif; font-size: 28px; font-weight: normal; }

        .toggle-wrapper { display: flex; gap: 20px; margin-bottom: 40px; }
        .toggle-btn { 
            flex: 1; 
            padding: 20px; 
            text-align: center; 
            background-color: #f0f0f0; 
            border-radius: 8px; 
            font-family: 'Times New Roman', Times, serif; 
            font-size: 20px; 
            transition: background 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .toggle-btn.active { background-color: #c0e6fa; }
        .toggle-btn:hover:not(.active) { background-color: #e4e4e4; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card {
            border: 1px solid #dcdcdc; 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 260px;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; height: 140px; object-fit: contain; transition: transform 0.3s; }
        .card:hover img { transform: scale(1.05); }
        .card-title { font-family: 'Times New Roman', Times, serif; font-size: 17px; margin-top: 10px; text-align: center; }
    </style>
</head>

<body>
    <div id="shared-header"></div>

    <!-- Main -->
    <main class="container">
        <!-- Title changed -->
        <div class="page-header">
            <a href="main.html" class="back-btn">←</a>
            <h1 class="page-title">Medium</h1>
        </div>

        <div class="toggle-wrapper">
            <!-- Medium，the right buttom is active -->
            <a href="categories.html" class="toggle-btn">Categories</a>
            <a href="medium.html" class="toggle-btn active">Medium</a>
        </div>

        <div class="grid">
            <!-- Card 1 -->
            <div class="card" data-title="Cast Marble" data-price="585" data-image="images/image 17.png">
                <img src="images/image 17.png" alt="Cast Marble">
                <div class="card-title">Cast Marble</div>
            </div>
            <!-- Card 2 -->
            <div class="card" data-title="Cold Cast Sculptures" data-price="415" data-image="images/image 18.png">
                <img src="images/image 18.png" alt="Cold Cast Sculptures">
                <div class="card-title">Cold Cast Sculptures</div>
            </div>
            <!-- Card 3 -->
            <div class="card" data-title="Hot Cast Sculptures" data-price="445" data-image="images/image 19.png">
                <img src="images/image 19.png" alt="Hot Cast Sculptures">
                <div class="card-title">Hot Cast Sculptures</div>
            </div>
            <!-- Card 4 -->
            <div class="card" data-title="Coloured / Painted Cast" data-price="215" data-image="images/image 20.png">
                <img src="images/image 20.png" alt="Coloured / Painted Cast">
                <div class="card-title">Coloured / Painted Cast</div>
            </div>
            <!-- Card 5 -->
            <div class="card" data-title="Wildlife Sculptures" data-price="585" data-image="images/image 27.png">
                <img src="images/image 27.png" alt="Wildlife Sculptures">
                <div class="card-title">Wildlife Sculptures</div>
            </div>
            <!-- Card 6 -->
            <div class="card" data-title="Small Pieces" data-price="215" data-image="images/image 28.png">
                <img src="images/image 28.png" alt="Small Pieces">
                <div class="card-title">Small Pieces</div>
            </div>
            <!-- Card 7 -->
            <div class="card" data-title="Cast Bronze" data-price="445" data-image="images/image 30.png">
                <img src="images/image 30.png" alt="Cast Bronze">
                <div class="card-title">Cast Bronze</div>
            </div>
            <!-- Card 8 -->
            <div class="card" data-title="Cast Silver" data-price="585" data-image="images/image 31.png">
                <img src="images/image 31.png" alt="Cast Silver">
                <div class="card-title">Cast Silver</div>
            </div>
        </div>
    </main>

    <div id="shared-footer"></div>
    <script src="js/cart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.card').forEach((card) => {
                card.addEventListener('click', () => {
                    window.location.href = 'product-3.html';
                });
            });
        });
    </script>

</body>
</html>
