<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ================================================
    Document Head
    ================================================
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOOT — Artworks & Sculptures</title>
   <!--
    ================================================
    External Resources Loading
    1. Google Fonts: 
       - Cormorant Garamond: Elegant serif font for headings
       - DM Sans: Modern sans-serif font for body text
    2. css/styles.css
       Internal stylesheet css/styles.css
    ================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    :root {
      /* White colors */
      --white:       #ffffff;
      --off-white:   #f7f5f2;
      --sand:        #ede8e1;
      --stone:       #c8c0b4;
      
      /* Ink colors (dark) */
      --ink:         #1a1a1a;
      --ink-light:   #3d3d3d;
      
      /* Ocean blue colors */
      --mist:        #d6e8f0;
      --ocean:       #8bbdd4;
      --ocean-deep:  #4a7f9c;
      --sky:         #e8f4f9;
      --sky-mid:     #c2dce9;
      --blue-label:  #2563eb;

      /* Font families */
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;

      /* Navigation height */
      --nav-h: 72px;
      
      /* Border radius */
      --radius-pill: 999px;
      --radius-card: 16px;

      /* Shadows */
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.14);
    }
    /* 
     * ============================================================
     * Reset & Base Styles
     * Remove default styles for cross-browser consistency
     * ============================================================
     */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* 平滑滚动 / Smooth scrolling */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* 基础元素样式 / Base element styles */
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    button { font-family: var(--sans); cursor: pointer; border: none; background: none; }

    /* 容器样式 / Container styles */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 32px;
    }
