<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ================================================
    Document Head
    ================================================
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOOT — Artworks & Sculptures</title>
   <!--
    ================================================
    External Resources Loading
    1. Google Fonts: 
       - Cormorant Garamond: Elegant serif font for headings
       - DM Sans: Modern sans-serif font for body text
    2. css/styles.css
       Internal stylesheet css/styles.css
    ================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    :root {
      /* White colors */
      --white:       #ffffff;
      --off-white:   #f7f5f2;
      --sand:        #ede8e1;
      --stone:       #c8c0b4;
      
      /* Ink colors (dark) */
      --ink:         #1a1a1a;
      --ink-light:   #3d3d3d;
      
      /* Ocean blue colors */
      --mist:        #d6e8f0;
      --ocean:       #8bbdd4;
      --ocean-deep:  #4a7f9c;
      --sky:         #e8f4f9;
      --sky-mid:     #c2dce9;
      --blue-label:  #2563eb;

      /* Font families */
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;

      /* Navigation height */
      --nav-h: 72px;
      
      /* Border radius */
      --radius-pill: 999px;
      --radius-card: 16px;

      /* Shadows */
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.14);
    }
    /* 
     * ============================================================
     * Reset & Base Styles
     * Remove default styles for cross-browser consistency
     * ============================================================
     */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Smooth scrolling */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Base element styles */
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    button { font-family: var(--sans); cursor: pointer; border: none; background: none; }

    /* Container styles */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 32px;
    }
    
    /* 
     * ============================================================
     * NAVBAR
     * Top：Search, cart and login on the righ
     * Main line: left logo + centered titles
     * ============================================================
     */
    
    /* Top icon row */
    .nav-top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      padding: 6px 32px;
      border-bottom: 1px solid #f0ece6;
    }

    /* Navigation icon buttons */
    .nav-icon-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--ink-light);
      transition: color .15s, background .15s;
    }
    .nav-icon-btn:hover { color: var(--ink); background: var(--off-white); }
    .nav-icon-btn svg { flex-shrink: 0; }
    .nav-icon-btn .login-text { font-weight: 500; }
    /* 
     * ============================================================
     * HERO
     * White top text → FOOT large background text + heart coral island image → gradient to blue
     * ============================================================
     */
    .hero {
      background: linear-gradient(to bottom, #f6fbfe 0%, #d6ecf5 30%, #a8d4e8 60%, #7dbcd8 100%);
      padding: 40px 0 0;
      overflow: hidden;
    }

    /* Intro text */
    .hero-intro {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 32px;
      padding: 0 20px;
      font-size: 15px;
      color: #555;
      line-height: 1.75;
    }

    /* Hero graphic area */
    .hero-graphic {
      position: relative;
      height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background FOOT letters */
    .hero-bg-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
      font-size: clamp(200px, 34vw, 420px);
      font-weight: 300;
      letter-spacing: .18em;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
      user-select: none;
      /* Letters overlap the image */
      z-index: 1;
    }

    /* Heart coral main image */
    .hero-island {
      position: relative;
      z-index: 2;
      width: 680px;
      max-width: 88vw;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      /* Radial mask: sharp center, fading edges */
      -webkit-mask-image: radial-gradient(ellipse 52% 50% at 50% 50%, rgba(0,0,0,1) 38%, rgba(0,0,0,0.6) 58%, rgba(0,0,0,0) 72%);
      mask-image:         radial-gradient(ellipse 52% 50% at 50% 50%, rgba(0,0,0,1) 38%, rgba(0,0,0,0.6) 58%, rgba(0,0,0,0) 72%);
    }
    /* 
     * ============================================================
     * CATEGORIES
     * ============================================================
     */
    .categories {
      background: linear-gradient(to bottom, #7dbcd8, #8bbdd4 60%, #8bbdd4);
      padding: 40px 0 32px;
    }

    /* View All / Section header: left title + right View All */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .05em;
      color: var(--ink);
    }
    .view-all {
      font-size: 13px;
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity .15s;
    }
    .view-all:hover { opacity: .65; }

    /* Tag pills */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .tag {
      background: var(--white);
      color: var(--ink);
      padding: 9px 22px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .tag:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.10); }
    /* 
     * ============================================================
     * WHAT'S NEW 
     * ============================================================
     */
    .whats-new {
      background: #8bbdd4;
      padding: 0 0 56px;
    }

    /* 4-col product grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .product-card {
      cursor: pointer;
    }

    /* White rounded image container */
    .card-img-wrap {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 20px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: box-shadow .2s, transform .2s;
    }
    .product-card:hover .card-img-wrap {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }
    .card-img-wrap img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .card-name {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--ink);
    }
    .card-price {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-light);
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 36px;
      font-family: var(--serif);
      font-size: 16px;
    }
    .pagination .pg-btn {
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink);
      transition: background .15s;
    }
    .pagination .pg-btn:hover { background: rgba(255,255,255,0.5); }
    .pg-num {
      cursor: pointer;
      color: var(--ink);
      min-width: 24px;
      text-align: center;
      transition: font-weight .1s;
    }
    .pg-num.active { color: white; font-weight: 700; }
    /* 
     * ============================================================
     * EXPLORE BY MEDIUM 
     * Used Rectangle_2.png as background
     * ============================================================
     */
    .explore {
      position: relative;
      /* Use uploaded underwater image as background */
      background: url('./images/Rectangle 2.png') center / cover no-repeat;
      color: var(--white);
      padding: 90px 32px;
      overflow: hidden;
    }

    /* Dark overlay for readability */
    .explore::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,40,65,0.55) 0%, rgba(10,40,80,0.25) 100%);
    }

    .explore-inner {
      position: relative;
      z-index: 1;
      max-width: 1160px;
      margin: 0 auto;
    }

    /* Featured badge */
    .featured-badge {
      display: inline-block;
      background: var(--white);
      color: var(--ink);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 24px;
      border-radius: var(--radius-pill);
      margin-bottom: 28px;
    }

    .explore-title {
      font-family: var(--sans);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 18px;
    }

    .explore-desc {
      font-family: var(--serif);
      font-size: 18px;
      font-style: italic;
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 36px;
      opacity: .9;
    }

    /* Browse collection / Browse button */
    .btn-browse {
      background: #3a3a3a;
      color: var(--white);
      font-size: 15px;
      font-weight: 500;
      padding: 14px 40px;
      border-radius: 6px;
      display: inline-block;
      transition: background .2s;
    }
    .btn-browse:hover { background: #1a1a1a; }
